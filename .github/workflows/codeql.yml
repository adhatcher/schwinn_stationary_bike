name: CodeQL

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: "25 4 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    uses: adhatcher-org/shared-workflows/.github/workflows/codeql.yml@e6520622447b5a743aab60bba5dc25c95a32cc69 # v1.0.0
    with:
      languages: '["python"]'
