name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test-and-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: python -m pip install "poetry==2.3.2"

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: make test

      - name: Run coverage
        run: make coverage

      - name: Run security checks
        run: make security
