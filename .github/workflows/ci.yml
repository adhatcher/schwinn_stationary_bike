name: CI

on:
  pull_request:
    branches:
      - master

jobs:
  test-and-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5.0.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.11.7"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: make test

      - name: Run coverage
        run: make coverage

      - name: Run security checks
        run: make security
