<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Enter New Workout</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<div class="page">
  {% set subtitle = "Upload a new Schwinn workout file and merge it into your history." %}
  {% include "_header.html" %}

  <div class="grid">
    <section class="card form-card">
      <h2>Enter New Workout</h2>
      <form method="post" enctype="multipart/form-data">
        <div class="row">
          <div>
            <label for="dat_file">Select Workout File</label>
            <input type="file" id="dat_file" name="dat_file" accept=".dat,.DAT,.txt">
          </div>
        </div>
        <div class="action-row">
          <button class="btn" type="submit">Import Workout File</button>
          <a class="btn btn-secondary" href="{{ url_for('welcome') }}">Back To Welcome Page</a>
        </div>
      </form>
      {% if message %}
        <div class="message">{{ message }}</div>
      {% endif %}
    </section>
  </div>
</div>
</body>
</html>
