<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recover Password</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<div class="page page-narrow">
  {% set subtitle = "Request a password reset email to regain access to your account." %}
  {% include "_header.html" %}

  <div class="grid">
    <section class="card auth-card">
      <h2 class="welcome-title">Recover Password</h2>
      <p class="auth-copy">Enter your email address and we’ll send a password reset link if an account exists.</p>
      {% if message %}
        <div class="message">{{ message }}</div>
      {% endif %}
      <form method="post">
        <div class="row">
          <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ email }}" autocomplete="email" required>
          </div>
        </div>
        <div class="action-row">
          <button class="btn" type="submit">Send Reset Link</button>
          <a class="btn btn-secondary" href="{{ url_for('login') }}">Back To Login</a>
        </div>
      </form>
    </section>
  </div>
</div>
</body>
</html>
